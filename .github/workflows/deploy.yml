name: Deploy MEAN App to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Backend Image
      run: |
        docker build -t tejas018/dd-backend:latest ./backend
        docker push tejas018/dd-backend:latest

    - name: Build and Push Frontend Image
      run: |
        docker build -t tejas018/dd-frontend:latest ./frontend
        docker push tejas018/dd-frontend:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/dd-app
          docker compose down
          docker compose pull
          docker compose up -d
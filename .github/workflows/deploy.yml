name: Deploy MEAN App to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Backend Image
      run: |
        docker build -t tejas018/dd-backend:${{ github.sha }} ./backend
        docker push tejas018/dd-backend:${{ github.sha }}

    - name: Build and Push Frontend Image
      run: |
        docker build -t tejas018/dd-frontend:${{ github.sha }} ./frontend
        docker push tejas018/dd-frontend:${{ github.sha }}

    - name: Copy docker-compose to EC2
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "docker-compose.yml"
        target: "~/dd-app"

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/dd-app
          export IMAGE_TAG=${{ github.sha }}
          docker pull tejas018/dd-backend:${IMAGE_TAG}
          docker pull tejas018/dd-frontend:${IMAGE_TAG}
          docker compose down
          IMAGE_TAG=${IMAGE_TAG} docker compose up -d
          echo "Deployed with IMAGE_TAG=${IMAGE_TAG}"